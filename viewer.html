<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF 在线预览</title>
  <style>
    /* 全局重置，彻底消除空白 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #fff;
    }
    /* PDF嵌入容器，100%填充屏幕 */
    embed {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
      outline: none;
    }
  </style>
</head>
<body>
  <embed src="test.pdf" type="application/pdf">
</body>
</html>
