<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF 在线预览</title>
  <!-- 引入PDF.js核心库，CDN加载，无需本地文件 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.js"></script>
  <style>
    * {margin: 0;padding: 0;box-sizing: border-box;}
    html, body {height: 100vh;width: 100vw;overflow: hidden;background: #f5f5f5;}
    /* 全屏PDF容器 */
    #pdf-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      background: #fff;
    }
    /* 加载提示 */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="pdf-container">
    <div class="loading">PDF加载中...</div>
  </div>

  <script>
    // 配置PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.js";

    const pdfUrl = "test.pdf"; // 你的PDF文件路径
    const container = document.getElementById("pdf-container");

    // 加载PDF
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    loadingTask.promise.then(pdf => {
      // 加载第一页
      return pdf.getPage(1);
    }).then(page => {
      // 移除加载提示
      container.querySelector(".loading").remove();

      // 计算缩放比例，适配屏幕
      const viewport = page.getViewport({ scale: 1 });
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const scale = Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
      const scaledViewport = page.getViewport({ scale });

      // 创建canvas
      const canvas = document.createElement("canvas");
      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;
      container.appendChild(canvas);

      // 渲染PDF到canvas
      const context = canvas.getContext("2d");
      page.render({
        canvasContext: context,
        viewport: scaledViewport
      });
    }).catch(err => {
      container.querySelector(".loading").textContent = "PDF加载失败，请检查文件";
      console.error("PDF加载错误:", err);
    });
  </script>
</body>
</html>
